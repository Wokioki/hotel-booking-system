services:
  postgres:
    image: postgres:16-alpine
    container_name: hotel-booking-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: hotel_booking_db
      POSTGRES_USER: hotel_user
      POSTGRES_PASSWORD: hotel_password

    ports:
      - "5433:5432"

    volumes:
      - hotel_booking_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotel_user -d hotel_booking_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  hotel_booking_postgres_data: