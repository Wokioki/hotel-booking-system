spring:
  application:
    name: hotel-booking-server

  datasource:
    url: jdbc:postgresql://localhost:5433/hotel_booking_db
    username: hotel_user
    password: hotel_password

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080